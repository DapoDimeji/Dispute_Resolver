<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GenLayer — Dispute Resolver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>Dispute Resolver</h1>
          <span>Decentralized Intelligence · GenLayer</span>
        </div>
      </div>
      <div class="wallet-badge">
        <div class="dot off" id="walletDot"></div>
        <span id="connected">Not connected</span>
        <span id="networkBadge" style="margin-left:12px;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:0.72rem;color:var(--muted)">
          <span id="networkDot" style="width:10px;height:10px;border-radius:50%;background:transparent;display:inline-block;box-shadow:none"></span>
          <span id="networkName">—</span>
        </span>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card floating-card">
        <div class="stat-icon blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#63b3ed" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        </div>
        <div>
          <div class="stat-num" id="statTotal">—</div>
          <div class="stat-label">Total Disputes</div>
        </div>
      </div>
      <div class="stat-card floating-card">
        <div class="stat-icon purple">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9f7aea" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div>
          <div class="stat-num" id="statOpen">—</div>
          <div class="stat-label">Open / Voting</div>
        </div>
      </div>
      <div class="stat-card floating-card">
        <div class="stat-icon gold">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f6ad55" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div>
          <div class="stat-num" id="statResolved">—</div>
          <div class="stat-label">Resolved</div>
        </div>
      </div>
    </div>

    <div class="grid">

      <!-- Left column -->
      <div>
        <!-- Wallet connect -->
        <div class="card floating-card">
          <div class="card-title">Wallet</div>
          <div class="field">
            <label>Sender Address (0x...)</label>
            <input id="addrInput" type="text" placeholder="0xabc123..." />
          </div>
          <button id="connectBtn" class="btn btn-primary" data-tooltip="Connect MetaMask wallet" style="width:100%">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Connect Wallet
          </button>
        </div>

        <!-- Create dispute -->
        <div class="card floating-card">
          <div class="card-title">New Dispute</div>
          <div class="field">
            <label>Description</label>
            <textarea id="desc" rows="5" placeholder="Describe the dispute clearly..."></textarea>
          </div>
          <div class="field">
            <label>Stake Amount (u64)</label>
            <input id="stake" type="number" value="0" min="0" />
          </div>
          <div class="msg" id="createMsg"></div>
          <div class="btn-row">
            <button id="createBtn" class="btn btn-primary" data-tooltip="Create a new dispute">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              Create
            </button>
            <button id="stakeBtn" class="btn btn-ghost" data-tooltip="Stake as a juror on this dispute">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
              Stake as Juror
            </button>
          </div>
        </div>
      </div>

      <!-- Right column -->
      <div>
        <!-- Disputes list -->
        <div class="card floating-card">
          <div class="card-title" style="justify-content:space-between">
            Open Disputes
            <button class="btn btn-ghost btn-sm" data-tooltip="Refresh dispute list" onclick="refreshList()">↺ Refresh</button>
          </div>
          <div id="disputesList"><div class="empty">Loading...</div></div>
        </div>

        <!-- Details panel -->
        <div class="card floating-card" id="detailsCard">
          <div class="card-title">Dispute Details</div>
          <div id="details"></div>
          <div id="voteArea"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div>Dispute Resolver — API proxy mode</div>
    <div class="powered">
      <div class="powered-dot"></div>
      Powered by <strong style="color:var(--primary)">GenLayer</strong> · Decentralized Intelligence
    </div>
  </footer>

  <!-- Toast notification container -->
  <div id="toastContainer" style="position:fixed;top:24px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:10px;max-width:380px"></div>

  <!-- Runtime config for no-SDK mode -->
  <script>
    window.__GL_CONFIG = window.__GL_CONFIG || {
      contractAddress: "0x976De90EDD30807e5c03B7e310dD7d0DF89dc672",
      apiBase: "/api",
      networkLabel: "production-proxy",
      // Optional hardening:
      // writeAuthToken: "",
      // forwardSender: false
    };
  </script>
  <!-- GenLayer bridge (uses backend API proxy; no browser SDK required) -->
  <script src="genlayer-bridge.js"></script>
  <!-- App JS -->
  <script src="app.js"></script>
  <!-- Optional automated test suite: enable with ?test=1 -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.get('test') !== '1') return;
      var s = document.createElement('script');
      s.src = 'test.js';
      document.body.appendChild(s);
    })();
  </script>
  <!-- Modal for wallet/network messages -->
  <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,0.6);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center">
    <div id="modalBox" style="max-width:520px;margin:0 auto;background:var(--card-bg);border:1px solid rgba(255,255,255,0.04);padding:18px;border-radius:12px;box-shadow:0 18px 40px rgba(2,6,23,0.7);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div id="modalTitle" style="font-weight:800;font-size:1.05rem;color:var(--text)">Notice</div>
          <div id="modalNetwork" style="font-family:var(--mono);font-size:0.78rem;color:var(--muted)"></div>
        </div>
        <button id="modalClose" style="background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer">✕</button>
      </div>
      <div id="modalMsg" style="color:var(--text);line-height:1.4;font-size:0.95rem"></div>
    </div>
  </div>
</body>
</html>
